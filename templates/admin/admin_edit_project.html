<head>
    <title>Admin / Edit Project</title>
    <link rel="stylesheet" href="/f/css/admin.css">
</head>

<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" id="addTab" type="button">Add New Project</button>
            <button class="tab" id="editTab" type="button">Edit Project</button>
        </div>

        <div id="editProjectSection" class="hidden">
            <div class="section-title">Edit Project</div>
            <form id="editProjectForm" enctype="multipart/form-data">
                <label>Title:</label>
                <input type="text" name="title" value="{{ edit_project.title }}" required>

                <label>Date:</label>
                <input type="month" name="date" value="{{ edit_project.date }}" required>

                <label>Video link:</label>
                <input type="text" name="video_link" value="{{ edit_project.video_link }}">

                <label>Medium:</label>
                <input type="text" name="medium" value="{{ edit_project.medium }}">

                <label>Duration:</label>
                <input type="text" name="duration" value="{{ edit_project.duration }}">

                <label>Concept:</label>
                <textarea name="concept" rows="5" cols="40">{{ edit_project.concept }}</textarea>

                {% for pic in edit_project.saved_files %}
                <!-- <img src="/f/static/images/{{ edit_project.dir }}/{{ pic }}" class="thumbnail"> -->
                {% endfor %}

                <input type="hidden" name="dir" value="{{ edit_project.dir }}">
                <input type="hidden" name="id" value="{{ edit_project.id }}">

                <button type="submit">Submit</button>
            </form>
        </div>

    </div>

    <script>
        document.getElementById('big_row').addEventListener('change', function () {
            let tillInput = document.getElementById('till');
            let tillLabel = document.getElementById('tillLabel');

            if (this.checked) {
                tillInput.style.display = 'none';
                tillLabel.style.display = 'none';
                tillInput.value = document.getElementById('from').value;
            } else {
                tillInput.style.display = '';
                tillLabel.style.display = '';
            }
        });

        document.getElementById('from').addEventListener('input', function () {
            let bigRow = document.getElementById('big_row');
            if (bigRow.checked) {
                document.getElementById('till').value = this.value;
            }
        });
    </script>

    <script src="/f/js/admin.js"></script>
    <script src="/f/js/submit_forms.js"></script>

</body>
