<!DOCTYPE html<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #eff6ff 0%, #d6d6d6 100%);
            min-height: 100vh;
            margin: 0;
            font-family: "Workbench", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "BLED" 0,
                "SCAN" -10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 320px;
            border: 3px dashed #777777;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-10px);
            }
        }

        .login-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            color: #009825;
            font-size: 2.2rem;
        }

        .emoji {
            font-size: 2.5rem;
            animation: wiggle 1.5s infinite;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-10deg);
            }

            75% {
                transform: rotate(10deg);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            color: #6a89cc;
            margin-bottom: 0.5rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #7a66ff00;
            border-radius: 12px;
            font-size: 1.1rem;
            background: #c5c7ff70;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input[type="password"]:focus {
            border-color: #ff9a9e;
            background: #fff;
            outline: none;
            transform: scale(1.02);
        }

        .btn-login {
            background: linear-gradient(to right, #c7c7c7, #c4c4c4);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: scale(1.05);
            background: linear-gradient(to right, #fad0c4, #ff9a9e);
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .password-hint {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 0.3rem;
            font-style: italic;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Workbench:SCAN@-10&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="login-title">
            <span class="emoji">🔐</span>
            <h1>Admin site</h1>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <input type="password" id="password" name="password" required placeholder="Password...">
            </div>

            <button type="submit" class="btn-login">
                <span>Log me in!</span>
            </button>
        </form>

    </div>
</body>

</html>
