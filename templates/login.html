<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #f5f6fa;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login_site {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login_site form {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .login_site h2 {
            margin-bottom: 1.5rem;
            color: #2d3436;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 1rem;
            color: #636e72;
        }

        input[type="password"] {
            padding: 0.7rem;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.2s;
        }

        input[type="password"]:focus {
            border: 1.5px solid #0984e3;
            outline: none;
        }

        .btn.btn-primary {
            background: #0984e3;
            color: #fff;
            border: none;
            padding: 0.8rem 0;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn.btn-primary:hover {
            background: #74b9ff;
        }
    </style>

</head>

<body>
    <div class="login_site">
        <h2>admin</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Log In</button>
        </form>
    </div>
</body>
